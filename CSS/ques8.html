<!DOCTYPE html>
<html>
<head>
<title>CSS Position</title>
<style>
.static{
position:static;
border:2px solid black;
}
.relative{
position:relative;
left:20px;
border:2px solid blue;
}
.absolute{
position:absolute;
top:150px;
left:50px;
border:2px solid red;
}
.fixed{
position:fixed;
bottom:10px;
right:10px;
border:2px solid green;
}
.sticky{
position:sticky;
top:0;
border:2px solid purple;
}
</style>
</head>
<body>
<h3 class="sticky">Sticky Position</h3>
<p class="static">Static Position</p>
<p class="relative">Relative Position</p>
<p class="absolute">Absolute Position</p>
<p class="fixed">Fixed Position</p>
<p>Scroll to see sticky and fixed effects.</p>
<p>More content...</p>
<p>More content...</p>
<p>More content...</p>
</body>
</html>

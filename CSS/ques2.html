<!DOCTYPE html>
<html>
<head>
<title>Box Shadow and Text Shadow</title>

<style>

.box{
    width:300px;
    height:150px;
    border:1px solid black;
    box-shadow:5px 5px 10px gray;
    margin:20px;
    padding:5px;
}

.text{
    font-size:30px;
    text-shadow:2px 2px 5px red;
}

</style>

</head>
<body>

<h2 class="text">Text Shadow Example</h2>

<div class="box">
    This is a box with box shadow.
</div>

</body>
</html>

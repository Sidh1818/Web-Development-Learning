<!DOCTYPE html>
<html>
<head>
<title>CSS Position Properties</title>

<style>

body{
  height:2000px;
  font-family: Arial;
}

/* STATIC */
.static-box{
  position: static;
  background-color: lightblue;
  border: 2px solid black;
  padding:10px;
  margin:10px;
}

/* RELATIVE */
.relative-box{
  position: relative;
  left: 30px;
  top: 10px;
  background-color: lightgreen;
  border:2px solid black;
  padding:10px;
  margin:10px;
}

/* ABSOLUTE */
.container{
  position: relative;
  border:2px solid black;
  height:150px;
  margin:20px;
}

.absolute-box{
  position: absolute;
  top: 20px;
  right: 20px;
  background-color: orange;
  padding:10px;
}

/* FIXED */
.fixed-box{
  position: fixed;
  bottom: 10px;
  right: 10px;
  background-color: red;
  color:white;
  padding:10px;
}

/* STICKY */
.sticky-box{
  position: sticky;
  top: 0;
  background-color: yellow;
  padding:10px;
  border:2px solid black;
}

</style>
</head>

<body>

<h2>CSS Position Demonstration</h2>

<div class="static-box">
Static Position (Default)
</div>

<div class="relative-box">
Relative Position
</div>

<div class="container">
Container (Relative)
<div class="absolute-box">
Absolute Position
</div>
</div>

<div class="sticky-box">
Sticky Position (Scroll page to see effect)
</div>

<p>Scroll down the page to see fixed and sticky positions working.</p>

<div class="fixed-box">
Fixed Position
</div>

</body>
</html>

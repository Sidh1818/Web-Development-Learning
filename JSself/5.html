<!DOCTYPE html>
<html>
    <head>
        <title>Self Modifying Page</title>
        <script>
            var messages = [
                "Welcome to the Page!",
                "This page changes every minute.",
                "JavaScript is fun!",
                "Keep Learning!",
                "You are awesome!"
            ];

            var colors = ["lightblue", "lightgreen", "lightyellow", "lightpink", "lightsalmon"];

            var index = 0;

            function modifyPage() {
                document.getElementById("msg").innerHTML = messages[index];
                document.body.style.backgroundColor = colors[index];
                document.getElementById("count").innerHTML = "Change #" + (index + 1);
                index = (index + 1) % messages.length;
            }

            setInterval(modifyPage, 60000);
        </script>
    </head>
    <body>
        <h2>Self Modifying Page</h2>
        <p id="msg">Page will change every minute...</p>
        <p id="count"></p>
    </body>
</html>

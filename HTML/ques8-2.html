<!DOCTYPE html>
<html>
<head>
    <title>HTML5 Tags Demonstration</title>
</head>
<body>

<header>
    <h1>Welcome to HTML5 Demo Page</h1>
</header>

<nav>
    <a href="#">Home</a> |
    <a href="#">About</a> |
    <a href="#">Contact</a>
</nav>

<article>
    <h2>Article Section</h2>
    <p>This is an example of the article tag.</p>
</article>

<h3>Video Example</h3>
<video width="320" height="240" controls>
    <source src="video.mp4" type="video/mp4">
</video>

<h3>Audio Example</h3>
<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<h3>Embed Example</h3>
<embed src="sample.pdf" width="300" height="200">

<h3>Datalist Example</h3>
<label>Choose a browser:</label>
<input list="browsers">
<datalist id="browsers">
    <option value="Chrome">
    <option value="Firefox">
    <option value="Edge">
    <option value="Safari">
</datalist>

<h3>BDI Example</h3>
<p>User name: <bdi>محمد</bdi></p>

<h3>Output Example</h3>
<form oninput="result.value=parseInt(a.value)+parseInt(b.value)">
    Enter number 1:
    <input type="number" id="a" value="0">
    <br><br>
    Enter number 2:
    <input type="number" id="b" value="0">
    <br><br>
    Result:
    <output name="result">0</output>
</form>

<footer>
    <p>Copyright © 2026 Hotel Website</p>
</footer>

</body>
</html>

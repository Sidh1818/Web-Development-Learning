<!DOCTYPE html>
<html>
<head>
    <title>Hotel Customer Profile</title>
</head>
<body>

<h2>Hotel Customer Profile</h2>

<form>

<fieldset>
<legend>Customer Information</legend>

Name:
<input type="text" name="name">
<br><br>

Address:
<textarea name="address" rows="3" cols="30"></textarea>
<br><br>

Age:
<input type="number" name="age">
<br><br>

Gender:
<input type="radio" name="gender" value="male"> Male
<input type="radio" name="gender" value="female"> Female
<br><br>

Room Type:
<input type="radio" name="room"> A/C
<input type="radio" name="room"> Non-A/C
<input type="radio" name="room"> Deluxe
<br><br>

Type of Payment:
<input type="radio" name="payment"> Cash
<input type="radio" name="payment"> Credit/Debit Card
<input type="radio" name="payment"> Coupons
<br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</fieldset>

</form>

</body>
</html>
